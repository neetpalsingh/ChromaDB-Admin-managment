version: '3.8'

services:
  # ChromaDB Admin Dashboard
  chromadb-admin:
    build: .
    container_name: chromadb-admin
    ports:
      - "${HOST_PORT:-3434}:3434"
    environment:
      # ChromaDB Configuration
      - VITE_CHROMADB_URL=${CHROMADB_URL:-http://chromadb:8000}
      - CHROMADB_URL=${CHROMADB_URL:-http://chromadb:8000}

      # Application URLs
      - VITE_APP_URL=${APP_URL:-http://localhost:3434}
      - VITE_ADMIN_URL=${APP_URL:-http://localhost:3434}

      # Server Configuration
      - PORT=${CONTAINER_PORT:-3434}
      - NODE_ENV=production

      # CORS
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3434}
    
    volumes:
      # Optional: Mount .env file
      - ./.env:/app/.env:ro
    
    restart: unless-stopped
    
    networks:
      - chromadb-network
    
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3434/api/v1/healthcheck', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: ChromaDB instance (if you don't have one running)
  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    ports:
      - "8000:8000"
    volumes:
      - chromadb-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=${ANONYMIZED_TELEMETRY:-TRUE}
    restart: unless-stopped
    networks:
      - chromadb-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  chromadb-network:
    driver: bridge

volumes:
  chromadb-data:
    driver: local
